<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate | SBL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="logo" style="margin-bottom: 2rem; justify-content: center; font-size: 2rem;">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M6 5v14"/><path d="M18 5v14"/><path d="M2 7h4v10H2z"/><path d="M18 7h4v10h-4z"/><path d="M6 12h12"/></svg>
            SCIENCE<span>BASED</span>LIFTING
        </div>
        
        <form class="auth-form" action="{{ url_for('login_page') }}" method="POST">
            <h2>SYSTEM ACCESS</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <p style="color: var(--accent); text-align: center; margin-bottom: 1rem;">{{ message }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required pattern="^\S+$" title="Username cannot contain spaces" placeholder="Name/ID (no spaces)">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">AUTHENTICATE</button>
            
            <p class="auth-note" style="margin-top: 20px;">
                <a href="{{ url_for('home_page') }}" style="color: var(--text-muted); text-decoration: none;">← Back to Home</a> | 
                <a href="{{ url_for('signup_page') }}" class="accent-text" style="text-decoration: none;">Register New Account</a>
            </p>
        </form>
    </div>

</body>
</html>
