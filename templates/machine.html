<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis | SBL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='machine.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M6 5v14"/><path d="M18 5v14"/><path d="M2 7h4v10H2z"/><path d="M18 7h4v10h-4z"/><path d="M6 12h12"/></svg>
                SCIENCE<span>BASED</span>LIFTING
            </div>
            <a href="{{ url_for('home_page') }}" class="back-link">← RETURN TO DATABASE</a>
        </div>
    </nav>

    <div class="detail-wrapper">
        <div class="visual-panel">
            <div class="video-container">
                <img id="detail-img" src="" alt="Machine Preview" onerror="this.src='https://placehold.co/800x400/171717/eab308?text=Visual+Unavailable'">
                <div class="play-button" onclick="playVideo()">▶</div>
                <iframe id="detail-video" data-src="" src="" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="display: none;"></iframe>
            </div>
            
            <div class="muscle-diagram">
                <h3>TARGET MUSCLE</h3>
                <h2 id="detail-muscle" class="accent-text">Loading...</h2>
            </div>
        </div>

        <div class="data-panel">
            <h1 id="detail-title">LOADING DATA...</h1>
            <div class="divider"></div>
            
            <div class="data-block">
                <h3>BIOMECHANICAL ANALYSIS</h3>
                <p id="detail-desc">Retrieving scientific breakdown...</p>
            </div>

            <div class="data-block">
                <h3>OPTIMAL EXECUTION</h3>
                <ul id="detail-steps" class="step-list"></ul>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
